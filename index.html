<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREST POLICE - HUB</title>
    <style>
        /* إعدادات الخلفية الشاملة: أسود ملكي مرصع بجزيئات ذهبية */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 50%, #110d04 0%, #000000 100%);
            background-image: 
                radial-gradient(circle at 50% 50%, #110d04 0%, #000000 100%),
                radial-gradient(rgba(212, 175, 55, 0.25) 1.5px, transparent 1.5px),
                radial-gradient(rgba(212, 175, 55, 0.1) 2px, transparent 2px);
            background-size: 100% 100%, 45px 45px, 65px 65px;
            background-position: 0 0, 0 0, 25px 25px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* حاوية التصميم لتشبه التطبيقات الذكية */
        .hub-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* حاوية الصورة العلوية الاحترافية البديلة للنصوص */
        .header-image-container {
            width: 100%;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            line-height: 0; 
        }

        .header-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* تصميم الأزرار الاحترافية الكبيرة مع النصوص الفرعية */
        .main-btn {
            display: block;
            width: 100%;
            padding: 22px 20px;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1405 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 16px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .main-btn:hover {
            transform: translateY(-3px);
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #121212 0%, #241c08 100%);
        }

        .btn-title {
            color: #d4af37;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .btn-subtitle {
            color: #b3b3b3;
            font-size: 13px;
        }

        /* زر التعديل الدائري المخفي في الأسفل */
        .edit-floating-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 99;
        }

        .edit-floating-btn:hover {
            border-color: #d4af37;
            background: rgba(30, 25, 10, 0.9);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .edit-floating-btn svg {
            width: 22px;
            height: 22px;
            fill: #d4af37;
        }

        /* نافذة إدخال الرمز المنبثقة الفاخرة */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .password-box {
            background: #0d0d0d;
            border: 1px solid #d4af37;
            padding: 35px 25px;
            border-radius: 16px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .password-container {
            position: relative;
            width: 100%;
            margin: 25px 0;
        }

        .password-container input {
            width: 100%;
            padding: 14px;
            padding-left: 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 16px;
        }
        
        .password-container input:focus {
            border-color: #d4af37;
            outline: none;
        }

        .toggle-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 15px;
        }

        /* لوحة التحكم بالروابط بعد إدخال الرمز */
        #editPanel {
            display: none;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #d4af37;
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
            text-align: right;
            width: 100%;
            max-width: 480px;
        }

        #editPanel label {
            color: #d4af37;
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
        }

        #editPanel input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            direction: ltr;
        }
        #editPanel input:focus { border-color: #d4af37; outline: none; }
    </style>
</head>
<body>

    <div class="hub-container">
        <!-- تم استبدال الاسم برابط الصورة المباشر لضمان ظهورها فوراً للجميع وبأعلى جودة -->
        <div class="header-image-container">
            <img src="https://cdn.discordapp.com/attachments/1110058957876879402/1206103444457193502/File_000000007298720ab686bf424275f9cc.png" alt="فصيل شرطة فورست">
        </div>

        <!-- زر مايكرو فصيل شرطة فورست -->
        <a href="https://google.com" id="linkMicro" class="main-btn" target="_blank">
            <div class="btn-title">مايكرو الخاص بفصيل شرطة فورست</div>
            <div class="btn-subtitle">قائمة الأوامر والانتهاكات الكاملة للفصيل</div>
        </a>

        <!-- زر دليل الشرطة -->
        <a href="https://google.com" id="linkPolice" class="main-btn" target="_blank">
            <div class="btn-title">دليل الشرطة</div>
            <div class="btn-subtitle">الأنظمة والتعليمات والقوانين الإرشادية</div>
        </a>
    </div>

    <!-- لوحة التعديل المخفية تفتح بالأسفل -->
    <div id="editPanel">
        <h3 style="color:#fff; text-align:center; margin-top:0;">تحديث الروابط الحالية</h3>
        <label>تعديل رابط خانة المايكرو:</label>
        <input type="text" id="inputMicroUrl" placeholder="https://example.com">

        <label>تعديل رابط دليل الشرطة:</label>
        <input type="text" id="inputPoliceUrl" placeholder="https://example.com">

        <button class="action-btn" onclick="saveNewLinks()">حفظ التعديلات الجديدة</button>
    </div>

    <!-- زر التعديل العائم المخفي بالأسفل (أيقونة القلم الدائرية) -->
    <div class="edit-floating-btn" onclick="openPasswordModal()">
        <svg viewBox="0 0 24 24">
            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        </svg>
    </div>

    <!-- نافذة طلب الرمز السرية -->
    <div class="modal-overlay" id="passwordModal">
        <div class="password-box">
            <h3 style="color: #d4af37; margin: 0; font-size: 18px;">نظام الإشراف والتعديل</h3>
            <div class="password-container">
                <input type="password" id="adminPassword" placeholder="أدخل رمز التحقق">
                <span class="toggle-btn" id="togglePassword" onclick="togglePass()">إظهار</span>
            </div>
            <button class="action-btn" onclick="verifyPassword()">تحقق</button>
            <button class="action-btn" style="background:#333; color:#fff;" onclick="closePasswordModal()">إغلاق</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            if(localStorage.getItem("microUrl")) {
                document.getElementById("linkMicro").href = localStorage.getItem("microUrl");
                document.getElementById("inputMicroUrl").value = localStorage.getItem("microUrl");
            }
            if(localStorage.getItem("policeUrl")) {
                document.getElementById("linkPolice").href = localStorage.getItem("policeUrl");
                document.getElementById("inputPoliceUrl").value = localStorage.getItem("policeUrl");
            }
        }

        function openPasswordModal() {
            document.getElementById("passwordModal").style.display = "flex";
            document.getElementById("adminPassword").value = "";
        }

        function togglePass() {
            var passField = document.getElementById("adminPassword");
            var toggleText = document.getElementById("togglePassword");
            if (passField.type === "password") {
                passField.type = "text";
                toggleText.textContent = "إخفاء";
            } else {
                passField.type = "password";
                toggleText.textContent = "إظهار";
            }
        }

        function verifyPassword() {
            var inputCode = document.getElementById("adminPassword").value;
            if (inputCode === "1221") {
                document.getElementById("passwordModal").style.display = "none";
                document.getElementById("editPanel").style.display = "block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                alert("الرمز السري خاطئ!");
            }
        }

        function saveNewLinks() {
            var newMicro = document.getElementById("inputMicroUrl").value;
            var newPolice = document.getElementById("inputPoliceUrl").value;

            if(newMicro) {
                document.getElementById("linkMicro").href = newMicro;
                localStorage.setItem("microUrl", newMicro);
            }
            if(newPolice) {
                document.getElementById("linkPolice").href = newPolice;
                localStorage.setItem("policeUrl", newPolice);
            }

            alert("تم تحديث وحفظ الروابط الذهبية بنجاح!");
            document.getElementById("editPanel").style.display = "none";
        }
        
        function closePasswordModal() {
            document.getElementById("passwordModal").style.display = "none";
        }
    </script>
</body>
</html>
