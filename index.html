<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREST POLICE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية الصفحة الرئيسية */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            transition: transform 0.5s ease;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #1f2833;
            text-shadow: 0 0 10px #45f3ff, 0 0 20px #45f3ff;
            -webkit-text-stroke: 1px #45f3ff;
            font-weight: 900;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* تصميم الأزرار المتموجة احترافياً */
        .btn-link {
            display: block;
            padding: 15px 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            background: linear-gradient(135deg, #0f1c3f 0%, #005c8a 50%, #00b4db 100%);
            background-size: 200% auto;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.2);
            transition: all 0.4s ease;
            border: 1px solid rgba(69, 243, 255, 0.2);
            cursor: pointer;
        }

        .btn-link:hover {
            background-position: right center;
            box-shadow: 0 6px 20px rgba(0, 243, 255, 0.4);
            transform: translateY(-3px);
            border-color: #45f3ff;
        }

        /* إطار عرض الصفحات الخارجية (iframe) */
        #page-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0b0c10;
            z-index: 999;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* زر الرجوع الذكي */
        .back-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #0f1c3f, #005c8a);
            color: #fff;
            border: 1px solid #45f3ff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.3);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 20px #45f3ff;
        }

        /* زر التعديل السري */
        .edit-icon {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.4;
        }

        .edit-icon:hover {
            opacity: 1;
            border-color: #45f3ff;
            box-shadow: 0 0 10px #45f3ff;
        }

        .edit-icon svg {
            fill: #45f3ff;
            width: 18px;
            height: 18px;
        }

        /* نافذة التعديل المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #11141a;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #005c8a;
            box-shadow: 0 0 25px rgba(0,92,138,0.5);
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #45f3ff;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: #1f242d;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            text-align: right;
        }

        .modal-content input:focus {
            border-color: #45f3ff;
            outline: none;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn { background: #00b4db; color: #fff; }
        .close-btn { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1>FOREST POLICE</h1>
        <div class="links-wrapper" id="links-container">
            </div>
    </div>

    <div id="page-viewer">
        <button class="back-btn" onclick="closePage()">رجوع للخلف ↩</button>
        <iframe id="iframe-target" src=""></div>
    </div>

    <div class="edit-icon" onclick="openEditWizard()" title="تعديل الروابط">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </div>

    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h3>تعديل محتوى الصفحة</h3>
            <label>الخيار الأول:</label>
            <input type="text" id="title1" placeholder="اسم الزر الأول">
            <input type="url" id="url1" placeholder="رابط الزر الأول" dir="ltr">
            
            <label>الخيار الثاني:</label>
            <input type="text" id="title2" placeholder="اسم الزر الثاني">
            <input type="url" id="url2" placeholder="رابط الزر الثاني" dir="ltr">
            
            <div class="modal-actions">
                <button class="close-btn" onclick="closeModal()">إلغاء</button>
                <button class="save-btn" onclick="saveData()">حفظ التعديلات</button>
            </div>
        </div>
    </div>

    <script>
        // الروابط الافتراضية المحددة من قبلك
        const defaultData = {
            btn1_title: "مايكرو الخاص بفصيل شرطه فورست",
            btn1_url: "https://a-bforest.github.io/Micro-Police-Forest/",
            btn2_title: "دليل الشرطة",
            btn2_url: "https://a-bforest.github.io/forest/"
        };

        // تحميل البيانات الحالية من المتصفح أو اعتماد الافتراضية
        function loadPageData() {
            const data = {
                btn1_title: localStorage.getItem('btn1_title') || defaultData.btn1_title,
                btn1_url: localStorage.getItem('btn1_url') || defaultData.btn1_url,
                btn2_title: localStorage.getItem('btn2_title') || defaultData.btn2_title,
                btn2_url: localStorage.getItem('btn2_url') || defaultData.btn2_url
            };

            const container = document.getElementById('links-container');
            container.innerHTML = `
                <button class="btn-link" onclick="openPage('${data.btn1_url}')">${data.btn1_title}</button>
                <button class="btn-link" onclick="openPage('${data.btn2_url}')">${data.btn2_title}</button>
            `;
        }

        // فتح الصفحات بداخل الـ Frame لضمان بقاء زر الرجوع فعالاً بالكامل
        function openPage(url) {
            document.getElementById('iframe-target').src = url;
            document.getElementById('page-viewer').style.display = 'block';
            document.getElementById('main-container').style.transform = 'scale(0.9)';
        }

        // العودة الكاملة للصفحة الرئيسية
        function closePage() {
            document.getElementById('page-viewer').style.display = 'none';
            document.getElementById('iframe-target').src = '';
            document.getElementById('main-container').style.transform = 'scale(1)';
        }

        // التحقق من الرمز السري عند الضغط على زر التعديل
        function openEditWizard() {
            const password = prompt("الرجاء إدخال رمز المرور للتعديل:");
            if (password === "1221") {
                document.getElementById('title1').value = localStorage.getItem('btn1_title') || defaultData.btn1_title;
                document.getElementById('url1').value = localStorage.getItem('btn1_url') || defaultData.btn1_url;
                document.getElementById('title2').value = localStorage.getItem('btn2_title') || defaultData.btn2_title;
                document.getElementById('url2').value = localStorage.getItem('btn2_url') || defaultData.btn2_url;
                document.getElementById('edit-modal').style.display = 'flex';
            } else if (password !== null) {
                alert("رمز المرور خاطئ! لا تملك صلاحية التعديل.");
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        // حفظ التعديلات الجديدة في ذاكرة المتصفح المحلية (Local Storage)
        function saveData() {
            localStorage.setItem('btn1_title', document.getElementById('title1').value);
            localStorage.setItem('btn1_url', document.getElementById('url1').value);
            localStorage.setItem('btn2_title', document.getElementById('title2').value);
            localStorage.setItem('btn2_url', document.getElementById('url2').value);
            
            closeModal();
            loadPageData(); // إعادة تحديث الأزرار فوراً
            alert("تم حفظ التعديلات بنجاح!");
        }

        // تشغيل الصفحة
        window.onload = loadPageData;
    </script>
</body>
</html>
