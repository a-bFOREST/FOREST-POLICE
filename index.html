<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Police Hub - Luxury Gold</title>
    <style>
        :root {
            --bg-color: #050505; /* أسود عميق */
            --card-bg: linear-gradient(135deg, #111111, #1a1a1a, #28231a); /* مزيج أسود مع لمحة ذهبية خافتة */
            --neon-gold: #ffdf00; /* ذهبي ناصع */
            --gold-glow: 0 0 15px #ffd700, 0 0 30px #b8860b; /* توهج ذهبي ملكي */
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #16120b 0%, #050505 100%); /* خلفية مرصعة بظلال ذهبية خفيفة */
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }

        /* الشعار العلوي */
        .header-card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid rgba(255, 223, 0, 0.2);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 223, 0, 0.05);
            position: relative;
        }

        .header-logo {
            max-width: 100%;
            height: auto;
            max-height: 120px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        /* الأزرار / الخيارات */
        .main-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 223, 0, 0.15); /* إطار ذهبي خفيف جداً */
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            display: block;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }

        .main-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--gold-glow);
            border-color: var(--neon-gold);
        }

        .btn-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--neon-gold);
            text-shadow: 0 0 10px rgba(255, 223, 0, 0.4);
            margin-bottom: 8px;
        }

        .btn-desc {
            font-size: 14px;
            color: #ccccba; /* رمادي مائل للذهبي الخافت */
        }

        /* زر الإعدادات المخفي */
        .admin-trigger {
            margin-top: auto;
            padding: 10px;
            background: none;
            border: none;
            color: #4a3f28;
            cursor: pointer;
            font-size: 12px;
            transition: color 0.2s;
        }
        .admin-trigger:hover {
            color: var(--neon-gold);
        }

        /* نافذة التحكم الإدارية */
        .admin-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111111;
            border: 2px solid var(--neon-gold);
            border-radius: 15px;
            padding: 20px;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--gold-glow), 0 0 50px rgba(0,0,0,0.9);
        }

        .admin-modal h3 {
            margin-top: 0;
            color: var(--neon-gold);
            text-align: center;
        }

        .admin-modal label {
            color: #dddddd;
            font-size: 14px;
        }

        .admin-modal input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 18px 0;
            box-sizing: border-box;
            background: #222222;
            border: 1px solid #444444;
            color: white;
            border-radius: 5px;
        }
        .admin-modal input:focus {
            border-color: var(--neon-gold);
            outline: none;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btns button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-save { background: var(--neon-gold); color: #000000; }
        .btn-close { background: #333333; color: white; }

        .overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- قسم الشعار العلوي (الأسود والذهبي) -->
        <div class="header-card">
            <!-- الشعار الافتراضي هنا أصبح باللون الأسود والذهبي تلقائياً -->
            <img id="main-logo" class="header-logo" src="https://placehold.co/600x200/0a0a0a/ffdf00?text=FOREST+POLICE" alt="Logo">
        </div>

        <!-- الخيار الأول: مايكرو فصيل فورست -->
        <a href="#" id="link1" class="main-btn" target="_blank">
            <div class="btn-title">مايكرو الخاص بفصيل شرطة فورست</div>
            <div class="btn-desc">قائمة الأوامر والانتهاكات الكاملة للفصيل</div>
        </a>

        <!-- الخيار الثاني: دليل شرطة فورست -->
        <a href="#" id="link2" class="main-btn" target="_blank">
            <div class="btn-title">دليل شرطة فورست</div>
            <div class="btn-desc">الأنظمة والتعليمات والقوانين الإرشادية</div>
        </a>

        <!-- زر الإدارة السري -->
        <button class="admin-trigger" onclick="checkCode()">⚙️ إدارة الموقع</button>
    </div>

    <!-- لوحة التحكم -->
    <div class="overlay" id="overlay"></div>
    <div class="admin-modal" id="adminModal">
        <h3>لوحة التحكم الفخمة</h3>
        <label>رابط الصورة العلوية (الشعار):</label>
        <input type="text" id="input-logo" placeholder="ضع رابط الصورة الذهبية هنا">
        
        <label>رابط المايكرو (الخيار الأول):</label>
        <input type="text" id="input-link1" placeholder="https://...">
        
        <label>رابط الدليل (الخيار الثاني):</label>
        <input type="text" id="input-link2" placeholder="https://...">
        
        <div class="modal-btns">
            <button class="btn-save" onclick="saveSettings()">حفظ التعديلات</button>
            <button class="btn-close" onclick="closeAdmin()">إلغاء</button>
        </div>
    </div>

    <script>
        // الرمز السري المطلوب
        const SECRET_CODE = "1221";

        // تحميل البيانات من ذاكرة المتصفح
        window.onload = function() {
            if(localStorage.getItem('logoUrl_gold')) {
                document.getElementById('main-logo').src = localStorage.getItem('logoUrl_gold');
            }
            if(localStorage.getItem('url1_gold')) {
                document.getElementById('link1').href = localStorage.getItem('url1_gold');
            }
            if(localStorage.getItem('url2_gold')) {
                document.getElementById('link2').href = localStorage.getItem('url2_gold');
            }
        }

        // التحقق من الرمز السري 1221
        function checkCode() {
            let password = prompt("الرجاء إدخال الرمز السري للتعديل:");
            if (password === SECRET_CODE) {
                openAdmin();
            } else if (password !== null) {
                alert("الرمز السري خاطئ!");
            }
        }

        function openAdmin() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('adminModal').style.display = 'block';
            
            document.getElementById('input-logo').value = document.getElementById('main-logo').src;
            document.getElementById('input-link1').value = document.getElementById('link1').href;
            document.getElementById('input-link2').value = document.getElementById('link2').href;
        }

        function closeAdmin() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('adminModal').style.display = 'none';
        }

        function saveSettings() {
            let logoUrl = document.getElementById('input-logo').value;
            let url1 = document.getElementById('input-link1').value;
            let url2 = document.getElementById('input-link2').value;

            if(logoUrl) {
                document.getElementById('main-logo').src = logoUrl;
                localStorage.setItem('logoUrl_gold', logoUrl);
            }
            if(url1) {
                document.getElementById('link1').href = url1;
                localStorage.setItem('url1_gold', url1);
            }
            if(url2) {
                document.getElementById('link2').href = url2;
                localStorage.setItem('url2_gold', url2);
            }

            alert("تم حفظ التعديلات بنجاح بالثيم الذهبي الجديد!");
            closeAdmin();
        }
    </script>
</body>
</html>
