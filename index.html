<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة تسجيل الدخول</title>
    <style>
        /* 1. تعديل الخلفية لتصبح بحجم الشاشة الكامل باللون الأسود المرصع بالذهبي */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* تأثير الخلفية السوداء الفاخرة المرصعة بالنقاط الذهبية اللامعة */
            background: radial-gradient(circle at 50% 50%, #161208 0%, #000000 100%);
            background-image: 
                radial-gradient(circle at 50% 50%, #161208 0%, #000000 100%),
                radial-gradient(rgba(212, 175, 55, 0.3) 1.5px, transparent 1.5px),
                radial-gradient(rgba(212, 175, 55, 0.15) 2px, transparent 2px);
            background-size: 100% 100%, 40px 40px, 60px 60px;
            background-position: 0 0, 0 0, 20px 20px;
            
            /* توسيط العناصر في منتصف الشاشة تماماً */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تصميم صندوق الدخول لتناسق المظهر */
        .login-box {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #d4af37; /* إطار ذهبي ناعم */
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            color: #d4af37;
            margin-bottom: 30px;
        }

        /* تصميم حقل كلمة المرور وزر الإظهار */
        .password-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .password-container input {
            width: 100%;
            padding: 12px 15px;
            padding-left: 60px; /* ترك مسافة لزر الإظهار جهة اليسار */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #555;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .password-container input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .toggle-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            font-weight: bold;
        }

        .toggle-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        
        <div class="password-container">
            <!-- حقل كلمة المرور النظيف -->
            <input type="password" id="passwordField" placeholder="أدخل كلمة المرور">
            
            <!-- زر الإظهار والإخفاء الذي يحل مشكلة الأقواس -->
            <span class="toggle-btn" id="togglePassword" onclick="togglePass()">إظهار</span>
        </div>
    </div>

    <!-- 2. كود الجافا سكريبت لحل مشكلة إظهار كلمة المرور بدون أقواس -->
    <script>
        function togglePass() {
            var passwordField = document.getElementById("passwordField");
            var toggleText = document.getElementById("togglePassword");
            
            // نغير فقط نوع الحقل (Type) للحفاظ على النص الأصلي دون تعديل أو إضافة أقواس
            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleText.textContent = "إخفاء";
            } else {
                passwordField.type = "password";
                toggleText.textContent = "إظهار";
            }
        }
    </script>

</body>
</html>
