            box-shadow: 0 0 20px rgba(69, 243, 255, 0.4);

        /* الوصف الفرعي السفلّي الصغير */

        }

        .modal-content {
            background: #11141a;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #005c8a;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #45f3ff;
        }

        .modal-content label {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 5px;
            background: #1f242d;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            text-align: right;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .modal-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;

        }

<body>

    <div class="container" id="main-container">
        <h1>FOREST POLICE</h1>
        <div class="links-wrapper">
            <!-- الأزرار مدمجة كـ HTML أساسي لضمان ظهورها الفوري -->
            <button class="btn-link" id="btn1" onclick="openPage(this.getAttribute('data-url'))">مايكرو الخاص بفصيل شرطه فورست</button>
            <button class="btn-link" id="btn2" onclick="openPage(this.getAttribute('data-url'))">دليل الشرطة</button>
        </div>
    </div>

    <!-- شاشة الـ Iframe لعرض الصفحات مع زر العودة -->
    <div id="page-viewer">
        <button class="back-btn" onclick="closePage()">رجوع للخلف ↩</button>
        <iframe id="iframe-target" src=""></iframe>
    </div>

    <!-- أيقونة التعديل السرية (أسفل اليسار) -->
    <div class="edit-icon" onclick="openEditWizard()" title="تعديل الروابط">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </div>

    <!-- نافذة التعديل المحمية برمز السري -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h3>تعديل محتوى الصفحة</h3>
            <label>الخيار الأول:</label>
            <input type="text" id="title1">
            <input type="url" id="url1" dir="ltr">
            
            <label>الخيار الثاني:</label>
            <input type="text" id="title2">
            <input type="url" id="url2" dir="ltr">
            
            <div class="modal-actions">
                <button class="close-btn" onclick="closeModal()">إلغاء</button>
                <button class="save-btn" onclick="saveData()">حفظ</button>
            </div>
        </div>
    </div>

    <script>
        // الروابط الافتراضية الثابتة
        const defaultData = {
            btn1_title: "مايكرو الخاص بفصيل شرطه فورست",
            btn1_url: "https://a-bforest.github.io/Micro-Police-Forest/",
            btn2_title: "دليل الشرطة",
            btn2_url: "https://a-bforest.github.io/forest/"
        };

        function setupLinks() {
            const b1 = document.getElementById('btn1');
            const b2 = document.getElementById('btn2');

            b1.innerText = localStorage.getItem('btn1_title') || defaultData.btn1_title;
            b1.setAttribute('data-url', localStorage.getItem('btn1_url') || defaultData.btn1_url);

            b2.innerText = localStorage.getItem('btn2_title') || defaultData.btn2_title;
            b2.setAttribute('data-url', localStorage.getItem('btn2_url') || defaultData.btn2_url);
        }

        function openPage(url) {
            if(url) {
                document.getElementById('iframe-target').src = url;
                document.getElementById('page-viewer').style.display = 'block';
            }
        }

        function closePage() {
            document.getElementById('page-viewer').style.display = 'none';
            document.getElementById('iframe-target').src = '';
        }

        function openEditWizard() {
            const password = prompt("الرجاء إدخال رمز المرور للتعديل:");
            if (password === "1221") {
                document.getElementById('title1').value = localStorage.getItem('btn1_title') || defaultData.btn1_title;
                document.getElementById('url1').value = localStorage.getItem('btn1_url') || defaultData.btn1_url;
                document.getElementById('title2').value = localStorage.getItem('btn2_title') || defaultData.btn2_title;
                document.getElementById('url2').value = localStorage.getItem('btn2_url') || defaultData.btn2_url;
                document.getElementById('edit-modal').style.display = 'flex';
            } else if (password !== null) {
                alert("رمز المرور خاطئ!");
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        function saveData() {
            localStorage.setItem('btn1_title', document.getElementById('title1').value);
            localStorage.setItem('btn1_url', document.getElementById('url1').value);
            localStorage.setItem('btn2_title', document.getElementById('title2').value);
            localStorage.setItem('btn2_url', document.getElementById('url2').value);
            
            closeModal();
            setupLinks();
            alert("تم حفظ التعديلات بنجاح!");
        }

        // تنفيذ فوري عند تحميل الملف
        setupLinks();
    </script>
</body>
