<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREST POLICE - HUB</title>
    <style>
        /* إعدادات الخلفية الشاملة: أسود ملكي مرصع بجزيئات ذهبية */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 50%, #110d04 0%, #000000 100%);
            background-image: 
                radial-gradient(circle at 50% 50%, #110d04 0%, #000000 100%),
                radial-gradient(rgba(212, 175, 55, 0.25) 1.5px, transparent 1.5px),
                radial-gradient(rgba(212, 175, 55, 0.1) 2px, transparent 2px);
            background-size: 100% 100%, 45px 45px, 65px 65px;
            background-position: 0 0, 0 0, 25px 25px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* حاوية التصميم لتشبه التطبيقات الذكية */
        .hub-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* حاوية الصورة العلوية الاحترافية البديلة للنصوص */
        .header-image-container {
            width: 100%;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            line-height: 0; 
        }

        .header-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* تصميم الأزرار الاحترافية الكبيرة مع النصوص الفرعية */
        .main-btn {
            display: block;
            width: 100%;
            padding: 22px 20px;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1405 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 16px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .main-btn:hover {
            transform: translateY(-3px);
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #121212 0%, #241c08 100%);
        }

        .btn-title {
            color: #d4af37;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .btn-subtitle {
            color: #b3b3b3;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <!-- الصورة العلوية الأساسية -->
        <div class="header-image-container">
            <img id="mainHeaderImg" src="abba.png" alt="فصيل شرطة فورست">
        </div>

        <!-- زر مايكرو فصيل شرطة فورست -->
        <a href="https://a-bforest.github.io/Micro-Police-Forest/" id="linkMicro" class="main-btn">
            <div class="btn-title">مايكرو الخاص بفصيل شرطة فورست</div>
            <div class="btn-subtitle">قائمة الأوامر والانتهاكات الكاملة للفصيل</div>
        </a>

        <!-- زر دليل الشرطة -->
        <a href="https://a-bforest.github.io/forest/" id="linkPolice" class="main-btn">
            <div class="btn-title">دليل الشرطة</div>
            <div class="btn-subtitle">الأنظمة والتعليمات والقوانين الإرشادية</div>
        </a>
    </div>

</body>
</html>
